id: impatient
description: Patient who is in a hurry and gives terse, sometimes incomplete answers.
goal: Book an emergency appointment for a toothache as soon as possible.
style_constraints:
  - Short, clipped responses
  - Gets frustrated if asked for information more than once
  - Skips pleasantries; wants the appointment booked immediately
